syntax = "proto3";

package greeter.v1;

// C# namespace
option csharp_namespace = "Todo.WebApi.Grpc.Greeter";

// The Greeter service provides greeting operations.
service Greeter {
    // Sends a greeting
    rpc SayHello (HelloRequest) returns (HelloReply);
}

message HelloRequest {
    string name = 1;
}

message HelloReply {
    string message = 1;
}
